<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>튜너 — CALIGO</title>
<link rel="stylesheet" href="style.css">
<style>
  html,body { height:100%; margin:0; overflow:hidden; background:#0c0c14; color:#e8e8f0;
    font-family:system-ui,sans-serif; }
  .app { height:100vh; display:flex; flex-direction:column; }
  /* ── 상단 바 ── */
  .bar { display:flex; gap:6px; align-items:center; padding:6px 10px; border-bottom:1px solid #222232; flex-wrap:nowrap; }
  .bar .sep { width:1px; height:22px; background:#2a2a3a; margin:0 4px; }
  .bar button { background:#22223a; color:#e8e8f0; border:1px solid #34344a; border-radius:7px;
    padding:6px 11px; font-size:0.8rem; cursor:pointer; white-space:nowrap; }
  .bar button:hover { background:#2e2e4a; }
  .bar button.active { background:#3f6a3f; border-color:#5f8a5f; }
  .bar button.fx { background:#2a2a44; }
  .bar button.stop { background:#5a2a2a; border-color:#8a3a3a; }
  .bar button.act { background:#3a2a4a; border-color:#5a3a6a; }
  .spacer { flex:1; }
  /* ── 본문: 보드 + 다이얼 ── */
  .body { flex:1; display:flex; gap:10px; padding:8px 10px; min-height:0; }
  .stage { flex:0 0 auto; display:flex; align-items:center; justify-content:center;
    background:#101019; border:1px solid #20202e; border-radius:12px; padding:6px; }
  #game-board { display:grid; gap:6px; }
  #game-board .cell { width:var(--cw,56px); height:var(--cw,56px); }
  .board-zoom { zoom:1.45; }
  .idle-ghost { opacity:0.4; }
  /* ★ 폭탄 idle 아웃라인 (튜너 확정값) — 블루그레이 외곽 + 소프트 글로우 (인게임과 동일) */
  .b-gif { filter:
      drop-shadow(0.9px 0 0 rgba(98,101,147,0.65)) drop-shadow(-0.9px 0 0 rgba(98,101,147,0.65))
      drop-shadow(0 0.9px 0 rgba(98,101,147,0.65)) drop-shadow(0 -0.9px 0 rgba(98,101,147,0.65))
      drop-shadow(0 0 1.5px rgba(98,101,147,0.9)) !important; }
  /* ── 다이얼 그리드 (auto-fill → 한 화면에 모두) ── */
  .dials { flex:1; min-width:0; display:grid; gap:7px; align-content:start;
    grid-template-columns:repeat(auto-fill, minmax(172px, 1fr)); overflow:hidden; }
  .grp { background:#14141f; border:1px solid #242436; border-radius:9px; padding:7px 9px; }
  .grp h3 { margin:0 0 4px; font-size:0.78rem; color:#ffd166; display:flex; justify-content:space-between; gap:6px; }
  .grp h3 .cur { font-family:ui-monospace,monospace; font-size:0.64rem; color:#7ee787; font-weight:400; }
  .dial { display:grid; grid-template-columns:46px 1fr 34px; align-items:center; gap:6px; margin:2px 0; }
  .dial label { font-size:0.68rem; color:#bcc; }
  .dial input { width:100%; height:14px; }
  .dial .v { font-family:ui-monospace,monospace; font-size:0.68rem; color:#7ee787; text-align:right; }
  /* 현재 값 출력 — 떠 있는 패널 (레이아웃 영향 X) */
  #out { position:fixed; right:14px; bottom:14px; max-width:340px; white-space:pre-wrap;
    font-family:ui-monospace,monospace; font-size:0.72rem; color:#ffd; background:#0a0a12ee;
    border:1px solid #3a3a5a; border-radius:8px; padding:10px 12px; display:none; z-index:50;
    box-shadow:0 6px 24px #000a; }
  #out.show { display:block; }
  #out .x { position:absolute; top:4px; right:8px; cursor:pointer; color:#9aa; }
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <button id="m-1v1" class="active">1v1</button>
    <button id="m-team">2v2</button>
    <span class="sep"></span>
    <button class="fx" data-fx="hit">⚔ 피격</button>
    <button class="fx" data-fx="death">💀 사망</button>
    <button class="fx" data-fx="bomb">💣 기폭</button>
    <button class="fx" data-fx="mark">🎯 표식</button>
    <button class="stop" id="btn-freeze">⏸ 정지</button>
    <span class="spacer"></span>
    <button class="act" id="btn-report">현재 값</button>
    <button class="act" id="btn-reset">기본값</button>
  </div>

  <div class="body">
    <div class="stage"><div class="board-zoom"><div class="board" id="game-board"></div></div></div>
    <div class="dials">
      <div class="grp"><h3>유닛 idle <span class="cur" id="c-u"></span></h3>
        <div class="dial"><label>크기</label><input type="range" id="u-size" min="26" max="56" value="38"><span class="v" id="vu-size">38</span></div>
        <div class="dial"><label>X</label><input type="range" id="u-x" min="-14" max="14" value="0"><span class="v" id="vu-x">0</span></div>
        <div class="dial"><label>Y</label><input type="range" id="u-y" min="-16" max="16" value="0"><span class="v" id="vu-y">0</span></div>
      </div>
      <div class="grp"><h3>💣 폭탄 <span class="cur" id="c-b"></span></h3>
        <div class="dial"><label>크기</label><input type="range" id="b-size" min="18" max="46" value="39"><span class="v" id="vb-size">39</span></div>
        <div class="dial"><label>bottom</label><input type="range" id="b-bottom" min="0" max="52" value="7"><span class="v" id="vb-bottom">7</span></div>
        <div class="dial"><label>right</label><input type="range" id="b-right" min="-16" max="20" value="7"><span class="v" id="vb-right">7</span></div>
      </div>
      <div class="grp"><h3>🐀 쥐 (%) <span class="cur" id="c-r"></span></h3>
        <div class="dial"><label>x</label><input type="range" id="r-x" min="0" max="60" value="37"><span class="v" id="vr-x">37</span></div>
        <div class="dial"><label>y</label><input type="range" id="r-y" min="-15" max="55" value="30"><span class="v" id="vr-y">30</span></div>
        <div class="dial"><label>크기</label><input type="range" id="r-w" min="28" max="95" value="50"><span class="v" id="vr-w">50</span></div>
      </div>
      <div class="grp"><h3>일반 사망 <span class="cur" id="c-dc"></span></h3>
        <div class="dial"><label>크기</label><input type="range" id="dc-size" min="30" max="100" value="74"><span class="v" id="vdc-size">74</span></div>
        <div class="dial"><label>X</label><input type="range" id="dc-x" min="-20" max="20" value="0"><span class="v" id="vdc-x">0</span></div>
        <div class="dial"><label>Y</label><input type="range" id="dc-y" min="-24" max="24" value="-6"><span class="v" id="vdc-y">-6</span></div>
      </div>
      <div class="grp"><h3>🐉 드래곤 사망 <span class="cur" id="c-dd"></span></h3>
        <div class="dial"><label>크기</label><input type="range" id="dd-size" min="30" max="160" value="40"><span class="v" id="vdd-size">40</span></div>
        <div class="dial"><label>X</label><input type="range" id="dd-x" min="-40" max="40" value="0"><span class="v" id="vdd-x">0</span></div>
        <div class="dial"><label>Y</label><input type="range" id="dd-y" min="-50" max="50" value="-6"><span class="v" id="vdd-y">-6</span></div>
      </div>
      <div class="grp"><h3>🔥 유황솥 사망 <span class="cur" id="c-ds"></span></h3>
        <div class="dial"><label>크기</label><input type="range" id="ds-size" min="30" max="140" value="40"><span class="v" id="vds-size">40</span></div>
        <div class="dial"><label>X</label><input type="range" id="ds-x" min="-40" max="40" value="0"><span class="v" id="vds-x">0</span></div>
        <div class="dial"><label>Y</label><input type="range" id="ds-y" min="-50" max="50" value="-6"><span class="v" id="vds-y">-6</span></div>
      </div>
      <div class="grp"><h3>유해 <span class="cur" id="c-rm"></span></h3>
        <div class="dial"><label>크기</label><input type="range" id="rm-size" min="30" max="100" value="74"><span class="v" id="vrm-size">74</span></div>
        <div class="dial"><label>X</label><input type="range" id="rm-x" min="-20" max="20" value="0"><span class="v" id="vrm-x">0</span></div>
        <div class="dial"><label>Y</label><input type="range" id="rm-y" min="-24" max="24" value="-6"><span class="v" id="vrm-y">-6</span></div>
      </div>
    </div>
  </div>
</div>
<div id="out"><span class="x" id="out-x">✕</span><span id="out-body"></span></div>

<script src="piece-gifs.js?v=20260516a"></script>
<script src="mark-anim.js"></script>
<script>
  const CB='?cb='+Date.now();
  const PG=window.PIECE_GIFS||{}, PD=window.PIECE_DEATH_GIFS||{}, RS=window.REMAINS_STAGE_IMGS||{}, RG=window.RAT_GIFS||{};
  const A={
    archer:'/art/archer_idle.gif'+CB, general:'/art/general_idle.gif'+CB,
    idleDragon:(PG.dragon||'/art/dragon_idle.gif')+CB, idleSulfur:(PG.sulfurCauldron||'/art/sulfurCauldron_idle.gif')+CB,
    dCommon:(PD._common||'/art/death_common.gif')+CB, dDragon:(PD.dragon||'/art/death_dragon.gif')+CB, dSulfur:(PD.sulfurCauldron||'/art/death_sulfurCauldron.gif')+CB,
    remains:(RS[1]||'/art/remains.png')+CB,
    ratBlack:((RG.black||{}).idle||'/art/rat_black_idle.gif')+CB, ratWhite:((RG.white||{}).idle||'/art/rat_white_idle.gif')+CB,
    bomb:(window.BOMB_IDLE_GIF||'/assets/bomb_idle.gif')+CB, bombExplode:(window.BOMB_EXPLODE_GIF||'/assets/bomb_explode.gif')+CB,
  };
  const board=document.getElementById('game-board');
  const val=id=>+document.getElementById(id).value;
  const setLbl=id=>{const e=document.getElementById('v'+id); if(e)e.textContent=document.getElementById(id).value;};
  const cell=()=>{const d=document.createElement('div'); d.className='cell'; return d;};

  function unitMarker(url, ghost){
    const mk=document.createElement('div'); mk.className='piece-marker u-marker'+(ghost?' idle-ghost':'');
    const ic=document.createElement('span'); ic.className='p-icon';
    const g=document.createElement('img'); g.className='p-gif u-gif'; g.src=url; ic.appendChild(g);
    mk.appendChild(ic);
    const hp=document.createElement('span'); hp.className='p-hp'; hp.textContent='3/3'; mk.appendChild(hp);
    return mk;
  }
  function bombImg(){ const b=document.createElement('img'); b.className='bomb-marker-gif b-gif'; b.src=A.bomb; return b; }
  function ratImg(mine){ const r=document.createElement('img'); r.className='rat-board-gif r-gif'; r.dataset.side=mine?'mine':'enemy'; r.src=mine?A.ratBlack:A.ratWhite; return r; }
  function deathOverlay(type,url,cls){ const ov=document.createElement('div'); ov.className='death-anim-overlay'; const img=document.createElement('img'); img.className='death-gif '+cls; if(type)img.dataset.deathType=type; img.src=url; ov.appendChild(img); return ov; }

  let fxCell;
  function build(){
    board.style.gridTemplateColumns='repeat(5, var(--cw,56px))'; board.style.width='fit-content'; board.innerHTML='';
    const cells=[]; const add=(col,row,fn)=>{ const c=cell(); c.dataset.col=col; c.dataset.row=row; fn(c); cells.push(c); };
    // row0 — 단독: 유닛+폭탄 / 유닛 / 내쥐 / 적쥐 / 빈칸
    add(0,0,c=>{c.classList.add('has-piece'); c.appendChild(unitMarker(A.general)); c.appendChild(bombImg());});
    add(1,0,c=>{c.classList.add('has-piece'); c.appendChild(unitMarker(A.archer));});
    add(2,0,c=>{c.classList.add('has-rat'); c.appendChild(ratImg(true));});
    add(3,0,c=>{c.classList.add('has-rat'); c.appendChild(ratImg(false));});
    add(4,0,c=>{});
    // row1 — 사망/유해 (잔상 위)
    add(0,1,c=>{c.classList.add('has-piece'); c.appendChild(unitMarker(A.archer,true)); c.appendChild(deathOverlay(null,A.dCommon,'dc-img'));});
    add(1,1,c=>{c.classList.add('has-piece'); c.appendChild(unitMarker(A.idleDragon,true)); c.appendChild(deathOverlay('dragon',A.dDragon,'dd-img'));});
    add(2,1,c=>{c.classList.add('has-piece'); c.appendChild(unitMarker(A.idleSulfur,true)); c.appendChild(deathOverlay('sulfurCauldron',A.dSulfur,'ds-img'));});
    add(3,1,c=>{c.classList.add('has-piece','has-remains'); c.appendChild(unitMarker(A.archer,true)); const im=document.createElement('img'); im.className='remains-marker rm-img'; im.src=A.remains; c.appendChild(im);});
    add(4,1,c=>{c.classList.add('has-piece'); c.appendChild(unitMarker(A.archer)); fxCell=c;});
    // row2 — 겹침: 유닛+폭탄+내쥐 / 유닛+내쥐 / 유닛+적쥐 / 폭탄+내쥐 / 유닛+폭탄+적쥐
    add(0,2,c=>{c.classList.add('has-piece','has-rat'); c.appendChild(unitMarker(A.general)); c.appendChild(bombImg()); c.appendChild(ratImg(true));});
    add(1,2,c=>{c.classList.add('has-piece','has-rat'); c.appendChild(unitMarker(A.archer)); c.appendChild(ratImg(true));});
    add(2,2,c=>{c.classList.add('has-piece','has-rat'); c.appendChild(unitMarker(A.archer)); c.appendChild(ratImg(false));});
    add(3,2,c=>{c.classList.add('has-rat'); c.appendChild(bombImg()); c.appendChild(ratImg(true));});
    add(4,2,c=>{c.classList.add('has-piece','has-rat'); c.appendChild(unitMarker(A.general)); c.appendChild(bombImg()); c.appendChild(ratImg(false));});
    cells.forEach(c=>board.appendChild(c));
  }

  function applyAll(){
    document.querySelectorAll('.u-gif').forEach(g=>{g.style.width=val('u-size')+'px'; g.style.height=val('u-size')+'px';});
    document.querySelectorAll('.u-marker').forEach(m=>{ m.style.transform=`translate(${val('u-x')}px,${val('u-y')}px)`; });
    document.querySelectorAll('.b-gif').forEach(b=>{ b.style.width=val('b-size')+'px'; b.style.height=val('b-size')+'px'; b.style.bottom=val('b-bottom')+'px'; b.style.right=val('b-right')+'px'; });
    document.querySelectorAll('.r-gif').forEach(rat=>{ const en=rat.dataset.side==='enemy'; const rx=en?-val('r-x'):val('r-x'); const fl=en?' scaleX(-1)':'';
      rat.style.cssText=`position:absolute;width:${val('r-w')}%;height:${val('r-w')}%;left:${50+rx}%;top:${50+val('r-y')}%;transform:translate(-50%,-50%)${fl};z-index:20;image-rendering:pixelated;filter:drop-shadow(0 0 1px rgba(0,0,0,1)) drop-shadow(0 0 1px rgba(0,0,0,1)) drop-shadow(0 0 3px rgba(150,100,220,0.35));pointer-events:none`; });
    const dg=(cls,s,x,y)=>document.querySelectorAll(cls).forEach(g=>{ g.style.width=val(s)+'px'; g.style.height=val(s)+'px'; g.style.transform=`translate(${val(x)}px,${val(y)}px)`; });
    dg('.dc-img','dc-size','dc-x','dc-y'); dg('.dd-img','dd-size','dd-x','dd-y'); dg('.ds-img','ds-size','ds-x','ds-y');
    document.querySelectorAll('.rm-img').forEach(g=>{ g.style.width=val('rm-size')+'px'; g.style.height=val('rm-size')+'px'; g.style.transform=`translate(calc(-50% + ${val('rm-x')}px), calc(-50% + ${val('rm-y')}px))`; });
    ['u-size','u-x','u-y','b-size','b-bottom','b-right','r-x','r-y','r-w','dc-size','dc-x','dc-y','dd-size','dd-x','dd-y','ds-size','ds-x','ds-y','rm-size','rm-x','rm-y'].forEach(setLbl);
    const g=id=>val(id);
    document.getElementById('c-u').textContent=`${g('u-size')} (${g('u-x')},${g('u-y')})`;
    document.getElementById('c-b').textContent=`${g('b-size')} b${g('b-bottom')} r${g('b-right')}`;
    document.getElementById('c-r').textContent=`x${g('r-x')} y${g('r-y')} ${g('r-w')}`;
    document.getElementById('c-dc').textContent=`${g('dc-size')} (${g('dc-x')},${g('dc-y')})`;
    document.getElementById('c-dd').textContent=`${g('dd-size')} (${g('dd-x')},${g('dd-y')})`;
    document.getElementById('c-ds').textContent=`${g('ds-size')} (${g('ds-x')},${g('ds-y')})`;
    document.getElementById('c-rm').textContent=`${g('rm-size')} (${g('rm-x')},${g('rm-y')})`;
  }

  // ★ 인게임과 동일한 피격: 방향 흔들림(hitShakeRight/Left 키프레임) + idle→피격 GIF(PIECE_HIT_GIFS) 교체 후 복원.
  function playHit(){
    const ic=fxCell.querySelector('.p-icon'); if(!ic)return;
    const idleImg=ic.querySelector('img.p-gif'); if(!idleImg)return;
    const mk=fxCell.querySelector('.piece-marker');
    const tx=idleImg.style.transform||'';
    const shake = tx.includes('scaleX(-1)') ? 'hitShakeLeft' : 'hitShakeRight';
    if(mk){ mk.style.animation='none'; void mk.offsetWidth; mk.style.animation=shake+' 0.35s ease'; setTimeout(()=>{mk.style.animation='';},420); }
    const m=idleImg.src.match(/\/([^/]+)_idle\.gif/);
    const hitUrl=m && (window.PIECE_HIT_GIFS||{})[m[1]];
    if(!hitUrl) return;
    const idleSrc=idleImg.src;
    fetch(hitUrl).then(r=>r.arrayBuffer()).then(ab=>{
      const s=new Uint8Array(ab); let ns=-1;
      for(let i=0;i<s.length-18;i++){ if(s[i]===0x21&&s[i+1]===0xFF&&s[i+2]===0x0B){ const sig=String.fromCharCode(s[i+3],s[i+4],s[i+5],s[i+6],s[i+7],s[i+8],s[i+9],s[i+10],s[i+11],s[i+12],s[i+13]); if(sig==='NETSCAPE2.0'){ns=i;break;} } }
      let p; if(ns>=0){ p=new Uint8Array(s.length-19); p.set(s.subarray(0,ns),0); p.set(s.subarray(ns+19),ns); } else p=s;
      const url=URL.createObjectURL(new Blob([p],{type:'image/gif'}));
      const dur=(window._gifDurationCache&&window._gifDurationCache[hitUrl.split('?')[0]])||520;
      idleImg.src=url;   // 같은 <img> 요소 → 다이얼 크기/방향 그대로 유지
      setTimeout(()=>{ idleImg.src=idleSrc.split('?')[0]+'?r='+Date.now(); URL.revokeObjectURL(url); }, dur);
    }).catch(()=>{});
  }
  function playDeath(){ fxCell.querySelectorAll('.death-anim-overlay').forEach(o=>o.remove()); const ov=deathOverlay(null,'/art/death_common.gif?x='+Date.now(),'dc-img'); fxCell.appendChild(ov); applyAll(); setTimeout(()=>ov.remove(),1400); }
  // 기폭 앞부분(10프레임)에 폭탄 idle 과 동일한 블루그레이 아웃라인 처리 (인게임과 동일).
  const ORANGE_OUTLINE='drop-shadow(0.9px 0 0 rgba(98,101,147,0.65)) drop-shadow(-0.9px 0 0 rgba(98,101,147,0.65)) drop-shadow(0 0.9px 0 rgba(98,101,147,0.65)) drop-shadow(0 -0.9px 0 rgba(98,101,147,0.65)) drop-shadow(0 0 1.5px rgba(98,101,147,0.9))';
  const BOMB_FRAME_MS=130;   // bomb_explode.gif ≈ 130ms/frame (BOMB_IMPACT_DELAY 1300 = frame10)
  function playBomb(){
    // 폭탄이 있는 모든 칸에서 기폭 (겹침 칸 포함) — 없으면 효과 셀에.
    const cells=[...document.querySelectorAll('#game-board .b-gif')].map(b=>b.closest('.cell')).filter(Boolean);
    (cells.length?cells:[fxCell]).forEach((cell,i)=>{
      const r=cell.getBoundingClientRect();
      const ex=document.createElement('img'); ex.src=A.bombExplode.split('?')[0]+'?x='+Date.now()+'_'+i;
      ex.style.cssText=`position:fixed;left:${r.left+r.width/2}px;top:${r.top+r.height/2}px;width:${r.width*1.5}px;height:${r.height*1.5}px;transform:translate(-50%,-50%);z-index:9999;pointer-events:none;image-rendering:pixelated`;
      // ★ 앞 10프레임은 idle 과 동일한 주황 아웃라인, 그 뒤(폭발 본격)부터는 아웃라인 제거.
      ex.style.filter=ORANGE_OUTLINE;
      document.body.appendChild(ex);
      setTimeout(()=>{ ex.style.filter=''; }, 10*BOMB_FRAME_MS);   // 10프레임 후 아웃라인 해제
      setTimeout(()=>ex.remove(),2600);
    });
  }
  function playMark(){ if(typeof animateMarkBrand!=='function')return; try{ animateMarkBrand([{col:4,row:1}],{boardId:'game-board'}); }catch(e){console.warn(e);} }
  const FX={hit:playHit,death:playDeath,bomb:playBomb,mark:playMark};

  let frozen=false;
  // ★ 정지 = img.src 를 현재 프레임 PNG(data URL)로 교체 → 같은 요소·같은 위치 그대로 멈춤(레이아웃 안 깨짐).
  function freezeImg(img){
    if(img.dataset.frozen) return;
    try{
      const nw=img.naturalWidth||img.width, nh=img.naturalHeight||img.height; if(!nw||!nh) return;
      const cv=document.createElement('canvas'); cv.width=nw; cv.height=nh;
      cv.getContext('2d').drawImage(img,0,0,nw,nh);
      img.dataset.origSrc=img.src;
      img.dataset.frozen='1';
      img.src=cv.toDataURL('image/png');   // 현재 프레임 정지 (in-place)
    }catch(e){}
  }
  function freezeAll(){
    document.querySelectorAll('#game-board img').forEach(freezeImg);
    document.querySelectorAll('body > img[src*="bomb_explode"]').forEach(freezeImg);
    frozen=true; const b=document.getElementById('btn-freeze'); b.textContent='▶ 재생'; b.classList.remove('stop'); b.classList.add('active');
  }
  function resumeAll(){
    document.querySelectorAll('img[data-frozen]').forEach(img=>{
      const o=img.dataset.origSrc; delete img.dataset.frozen; delete img.dataset.origSrc;
      if(o) img.src=o.split(/[?#]/)[0]+'?r='+Date.now();   // gif 프레임 0 부터 재시작
    });
    frozen=false; const b=document.getElementById('btn-freeze'); b.textContent='⏸ 정지'; b.classList.add('stop'); b.classList.remove('active');
  }

  // ── 모드별 독립 값 저장 ──
  //   1v1 = 사용자가 확정한 값 / 2v2 = 작은 셀(44px)에 맞춘 시작값(여기서 다시 조절).
  const DEF_1v1={'u-size':38,'u-x':0,'u-y':0,'b-size':39,'b-bottom':7,'b-right':7,'r-x':37,'r-y':30,'r-w':50,'dc-size':74,'dc-x':0,'dc-y':-6,'dd-size':40,'dd-x':0,'dd-y':-6,'ds-size':40,'ds-x':0,'ds-y':-6,'rm-size':74,'rm-x':0,'rm-y':-6};
  const DEF_2v2={'u-size':34,'u-x':0,'u-y':0,'b-size':31,'b-bottom':5,'b-right':5,'r-x':37,'r-y':30,'r-w':50,'dc-size':60,'dc-x':0,'dc-y':-5,'dd-size':33,'dd-x':0,'dd-y':-5,'ds-size':33,'ds-x':0,'ds-y':-5,'rm-size':60,'rm-x':0,'rm-y':-5};
  const DEFAULTS={'1v1':DEF_1v1,'2v2':DEF_2v2};
  const VALS={'1v1':{...DEF_1v1},'2v2':{...DEF_2v2}};
  let curMode='1v1';
  const KEYS=Object.keys(DEF_1v1);
  function loadVals(m){ const v=VALS[m]; KEYS.forEach(k=>{const el=document.getElementById(k); if(el)el.value=v[k];}); }
  function saveVals(m){ const v=VALS[m]; KEYS.forEach(k=>{const el=document.getElementById(k); if(el)v[k]=+el.value;}); }

  function fmtVals(m){ const v=VALS[m]; return `[${m}]
유닛 : ${v['u-size']} (${v['u-x']},${v['u-y']})
폭탄 : ${v['b-size']} bottom${v['b-bottom']} right${v['b-right']}
쥐   : x${v['r-x']} y${v['r-y']} w/h${v['r-w']}
일반사망 : ${v['dc-size']} (${v['dc-x']},${v['dc-y']})
드래곤사망: ${v['dd-size']} (${v['dd-x']},${v['dd-y']})
유황솥사망: ${v['ds-size']} (${v['ds-x']},${v['ds-y']})
유해 : ${v['rm-size']} (${v['rm-x']},${v['rm-y']})`; }
  function report(){ saveVals(curMode);
    document.getElementById('out-body').textContent=fmtVals('1v1')+'\n\n'+fmtVals('2v2');
    document.getElementById('out').classList.add('show'); }
  function reset(){ const d=DEFAULTS[curMode]; KEYS.forEach(k=>{const el=document.getElementById(k); if(el){el.value=d[k]; VALS[curMode][k]=d[k];}}); applyAll(); }
  function setMode(t){ const next=t?'2v2':'1v1';
    saveVals(curMode); curMode=next;
    document.body.classList.toggle('team-mode',t); board.style.setProperty('--cw',t?'44px':'56px');
    document.getElementById('m-1v1').classList.toggle('active',!t); document.getElementById('m-team').classList.toggle('active',t);
    loadVals(curMode); applyAll(); }

  document.querySelectorAll('input[type=range]').forEach(s=>s.addEventListener('input',()=>{ applyAll(); VALS[curMode][s.id]=+s.value; }));
  document.querySelectorAll('button[data-fx]').forEach(b=>b.addEventListener('click',()=>FX[b.dataset.fx]&&FX[b.dataset.fx]()));
  document.getElementById('btn-freeze').addEventListener('click',()=>frozen?resumeAll():freezeAll());
  document.getElementById('btn-report').addEventListener('click',report);
  document.getElementById('btn-reset').addEventListener('click',reset);
  document.getElementById('out-x').addEventListener('click',()=>document.getElementById('out').classList.remove('show'));
  document.getElementById('m-1v1').addEventListener('click',()=>setMode(false));
  document.getElementById('m-team').addEventListener('click',()=>setMode(true));

  function init(){ build(); setMode(false); applyAll(); if(typeof window.preloadAllAsync==='function')window.preloadAllAsync().catch(()=>{}); }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init); else init();
</script>
</body>
</html>
