<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CALIGO 효과음 테스트</title>
  <style>
    :root {
      --bg: #1a1410;
      --surface: #251c14;
      --surface2: #2e2418;
      --border: #3a2c1f;
      --text: #f0e6d6;
      --text-dim: #b8a78a;
      --muted: #7a6a55;
      --accent: #f0c040;
      --danger: #ef4444;
      --success: #22c55e;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      margin: 0; padding: 24px;
      min-height: 100vh;
    }
    h1 { color: var(--accent); margin: 0 0 8px; }
    h2 { color: var(--text-dim); font-size: 0.95rem; font-weight: 500; margin: 0 0 24px; }
    .group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 16px;
    }
    .group-title {
      font-size: 0.9rem; font-weight: 700; color: var(--accent);
      margin-bottom: 12px; letter-spacing: 0.5px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }
    .sfx-btn {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .sfx-btn:hover {
      background: rgba(240,192,64,0.12);
      border-color: var(--accent);
      color: var(--accent);
    }
    .sfx-btn:active {
      transform: scale(0.98);
    }
    .sfx-btn .label {
      font-weight: 600;
      display: block;
    }
    .sfx-btn .desc {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .info {
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .mute-toggle {
      position: fixed; top: 16px; right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <button class="mute-toggle" id="mute-toggle">🔔 효과음 켜짐</button>
  <h1>🎵 CALIGO 효과음 테스트</h1>
  <h2>버튼을 클릭하면 해당 효과음을 재생합니다.</h2>

  <div class="info">
    💡 첫 클릭 시 브라우저 오디오 컨텍스트가 깨어납니다. 페이지 진입 후 반드시 한 번 이상 클릭해주세요.
  </div>

  <div class="group">
    <div class="group-title">⚔ 전투 — 기본 액션</div>
    <div class="buttons">
      <button class="sfx-btn" data-sfx="turnBell"><span class="label">내 턴 종소리</span><span class="desc">880Hz → 1100Hz 사인웨이브</span></button>
      <button class="sfx-btn" data-sfx="move"><span class="label">이동</span><span class="desc">400Hz → 500Hz 짧은 사인</span></button>
      <button class="sfx-btn" data-sfx="attack"><span class="label">공격</span><span class="desc">200Hz → 100Hz sawtooth</span></button>
      <button class="sfx-btn" data-sfx="hit"><span class="label">피격</span><span class="desc">300Hz → 150Hz square</span></button>
      <button class="sfx-btn" data-sfx="kill"><span class="label">격파</span><span class="desc">400Hz → 80Hz 0.5초 sawtooth</span></button>
    </div>
  </div>

  <div class="group">
    <div class="group-title">✨ 스킬 — 일반</div>
    <div class="buttons">
      <button class="sfx-btn" data-sfx="skill"><span class="label">기본 스킬 (시전자)</span><span class="desc">스파클 + 마법 화음</span></button>
      <button class="sfx-btn" data-sfx="opp_skill"><span class="label">상대 스킬</span><span class="desc">어두운 마이너 + 바람 노이즈</span></button>
    </div>
  </div>

  <div class="group">
    <div class="group-title">🌟 스킬 — 캐릭터 전용 (기존)</div>
    <div class="buttons">
      <button class="sfx-btn" data-sfx="heal"><span class="label">회복 (약초학 / 신성)</span><span class="desc">상승 아르페지오 + 따뜻한 G5 + 고역 반짝이</span></button>
      <button class="sfx-btn" data-sfx="bombExplode"><span class="label">기폭 (화약상)</span><span class="desc">폭발 노이즈</span></button>
      <button class="sfx-btn" data-sfx="trapSnap"><span class="label">덫 발동 (인간 사냥꾼)</span><span class="desc">철컥</span></button>
      <button class="sfx-btn" data-sfx="curseDamage"><span class="label">저주 틱 피해 (마녀)</span><span class="desc">저주 효과음</span></button>
      <button class="sfx-btn" data-sfx="ratDeath"><span class="label">쥐 격파 (쥐장수)</span><span class="desc">짧은 비명</span></button>
    </div>
  </div>

  <div class="group">
    <div class="group-title">🆕 신규 스킬 전용 효과음 (13종)</div>
    <div class="buttons">
      <button class="sfx-btn" data-sfx="archerTune"><span class="label">궁수 정비 (반전)</span><span class="desc">기계 부품 회전 + 클릭 + 피치 슬라이드</span></button>
      <button class="sfx-btn" data-sfx="scout"><span class="label">척후병 척후</span><span class="desc">레이더 핑 (1800→2200Hz)</span></button>
      <button class="sfx-btn" data-sfx="twinsJoin"><span class="label">쌍둥이 합체 (분신)</span><span class="desc">C5+E5+G5 화음 듀엣</span></button>
      <button class="sfx-btn" data-sfx="messengerSprint"><span class="label">전령 질주</span><span class="desc">발걸음 3번 + 휘이익</span></button>
      <button class="sfx-btn" data-sfx="bombPlace"><span class="label">폭탄 설치 (폭파병)</span><span class="desc">째깍 3회 + 무거운 thud</span></button>
      <button class="sfx-btn" data-sfx="shadowHide"><span class="label">그림자 숨기 (암살자)</span><span class="desc">하강 글라이드 + 어두운 노이즈</span></button>
      <button class="sfx-btn" data-sfx="witchCurse"><span class="label">저주 시전 (마녀)</span><span class="desc">신비로운 글라이드 + 보컬 톤 + 종</span></button>
      <button class="sfx-btn" data-sfx="dualBlade"><span class="label">쌍검무 (양손검객)</span><span class="desc">금속 슬래시 2회</span></button>
      <button class="sfx-btn" data-sfx="ratSummon"><span class="label">역병의 자손들 (쥐 장수)</span><span class="desc">끽끽 5회 + 긁히는 노이즈</span></button>
      <button class="sfx-btn" data-sfx="armorerTune"><span class="label">무기상 정비 (전환)</span><span class="desc">망치질 2회 + 클릭</span></button>
      <button class="sfx-btn" data-sfx="kingRing"><span class="label">국왕 절대복종 반지</span><span class="desc">웅장한 종 + 광채 떨림</span></button>
      <button class="sfx-btn" data-sfx="dragonSummon"><span class="label">드래곤 소환 (조련사)</span><span class="desc">깊은 으르렁 + 사이렌 + 날갯짓</span></button>
    </div>
  </div>

  <div class="group">
    <div class="group-title">🛡 패시브 전용 효과음 (8종)</div>
    <div class="buttons">
      <button class="sfx-btn" data-sfx="passive"><span class="label">기본 패시브 (구버전)</span><span class="desc">참고용 — E5→A5 차임</span></button>
      <button class="sfx-btn" data-sfx="monkBlessing"><span class="label">가호 (수도승)</span><span class="desc">교회 종 화음 (A5+C#6+E6)</span></button>
      <button class="sfx-btn" data-sfx="wizardInstant"><span class="label">인스턴트 매직 (마법사)</span><span class="desc">반짝이 상승음 (800→3200Hz)</span></button>
      <button class="sfx-btn" data-sfx="ironSkin"><span class="label">아이언 스킨 (갑주무사)</span><span class="desc">금속 둔탁 깡</span></button>
      <button class="sfx-btn" data-sfx="bodyguardLoyalty"><span class="label">충성 (호위무사)</span><span class="desc">방패 부딪힘 + 짧은 함성</span></button>
      <button class="sfx-btn" data-sfx="countTyranny"><span class="label">폭정 (백작)</span><span class="desc">어두운 저음 마이너 + 노이즈</span></button>
      <button class="sfx-btn" data-sfx="commanderWrath"><span class="label">사기증진 (지휘관)</span><span class="desc">북 + 호른 (G4 → D5)</span></button>
      <button class="sfx-btn" data-sfx="butcherBetrayer"><span class="label">배반자 (학살영웅)</span><span class="desc">어두운 슬래시 + 비명</span></button>
      <button class="sfx-btn" data-sfx="torturerMark"><span class="label">표식 (고문 기술자)</span><span class="desc">사슬 짤랑 + 날카로운 클릭</span></button>
    </div>
  </div>

  <div class="group">
    <div class="group-title">🩸 악몽 (고문 기술자) — D 디벨롭 (비명 제거, 깔리는 소리 위주)</div>
    <div class="buttons">
      <button class="sfx-btn" data-sfx="nightmare4"><span class="label">D 원본 (비명 포함)</span><span class="desc">참고용 — 비명 + 클러스터 + 메아리</span></button>
      <button class="sfx-btn" data-sfx="nightmareD1"><span class="label">D1: 배경음만</span><span class="desc">5음 디소넌스 클러스터 + 깊은 우물 메아리 3회</span></button>
      <button class="sfx-btn" data-sfx="nightmareD2"><span class="label">D2: 두꺼운 디소넌스</span><span class="desc">7음 클러스터(반음 더 추가) + 메아리 4회 + 저음 드론</span></button>
      <button class="sfx-btn" data-sfx="nightmareD3"><span class="label">D3: 긴 잔향</span><span class="desc">5음 클러스터 + 메아리 5회 (점점 약해짐) + 종소리 잔향</span></button>
      <button class="sfx-btn" data-sfx="nightmareD4"><span class="label">D4: 클러스터 + 종</span><span class="desc">디소넌스 + 깊은 종 1회 + 우물 메아리 + 서브베이스 드론</span></button>
    </div>
  </div>

  <div class="group">
    <div class="group-title">🌋 유황범람 — C 계열 후보 (럼블+폭발+용암)</div>
    <div class="buttons">
      <button class="sfx-btn" data-sfx="sulfur3"><span class="label">C 원본</span><span class="desc">긴 저음 럼블 + 시간차 폭발 3회 + 용암 쉭</span></button>
      <button class="sfx-btn" data-sfx="sulfurC2"><span class="label">C2: 더 큰 분화</span><span class="desc">긴 럼블 + 폭발 5회 패턴 + 다중 용암 쉭</span></button>
      <button class="sfx-btn" data-sfx="sulfurC3"><span class="label">C3: 메인 폭발 + 애프터쇼크</span><span class="desc">럼블 + 큰 폭발 1회 + 잔폭 4회 + 화염</span></button>
      <button class="sfx-btn" data-sfx="sulfurC4"><span class="label">C4: 점점 커지는 폭발</span><span class="desc">럼블 + 작은→큰 폭발 4회 + 잔해 + 부드러운 화염</span></button>
    </div>
  </div>

  <div class="group">
    <div class="group-title">🌋 유황범람 — 기타 후보 (참고용)</div>
    <div class="buttons">
      <button class="sfx-btn" data-sfx="sulfur"><span class="label">A: 현재 버전</span><span class="desc">끓어오름 + 저음 폭발 + 화염</span></button>
      <button class="sfx-btn" data-sfx="sulfur2"><span class="label">B: 빌드업 + 대폭발</span><span class="desc">필터 스윕 + 폭발 + 낙석</span></button>
      <button class="sfx-btn" data-sfx="sulfur4"><span class="label">D: 지진 + 화산재</span><span class="desc">서브베이스 + 분출 4회 + 입자</span></button>
    </div>
  </div>

  <div class="group">
    <div class="group-title">🔔 시스템 알림</div>
    <div class="buttons">
      <button class="sfx-btn" data-sfx="passive"><span class="label">패시브 발동</span><span class="desc">부드러운 2음 차임 (E5 → A5)</span></button>
      <button class="sfx-btn" data-sfx="sp"><span class="label">SP 지급</span><span class="desc">800-1000-1200Hz 상승</span></button>
      <button class="sfx-btn" data-sfx="shrink"><span class="label">보드 축소</span><span class="desc">100→50Hz 1초 sawtooth</span></button>
      <button class="sfx-btn" data-sfx="boardQuake"><span class="label">보드 흔들림 (저음 진동)</span><span class="desc">쿠구궁</span></button>
      <button class="sfx-btn" data-sfx="btn_click"><span class="label">버튼 클릭</span><span class="desc">660 → 600Hz 짧은 사인</span></button>
    </div>
  </div>

  <div class="group">
    <div class="group-title">🎮 UI 효과음</div>
    <div class="buttons">
      <button class="sfx-btn" data-sfx="charSelect"><span class="label">캐릭터 선택</span><span class="desc">선택 효과음</span></button>
      <button class="sfx-btn" data-sfx="deckSave"><span class="label">덱 저장</span><span class="desc">저장 완료</span></button>
      <button class="sfx-btn" data-sfx="revealAppear"><span class="label">캐릭터 등장</span><span class="desc">공개 효과음</span></button>
      <button class="sfx-btn" data-sfx="swapBlink"><span class="label">교환 깜빡임</span><span class="desc">교환 단계</span></button>
      <button class="sfx-btn" data-sfx="swapReveal"><span class="label">교환 공개</span><span class="desc">교환 결과</span></button>
      <button class="sfx-btn" data-sfx="chat"><span class="label">채팅 알림</span><span class="desc">메시지 도착</span></button>
    </div>
  </div>

<script>
let sfxMuted = false;
let _sharedAudioCtx = null;
function getAudioCtx() {
  if (!_sharedAudioCtx) {
    try { _sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (_sharedAudioCtx.state === 'suspended') {
    try { _sharedAudioCtx.resume(); } catch (e) {}
  }
  return _sharedAudioCtx;
}

// ── 모든 효과음 함수 — public/game.js 와 동일 ──

function playTurnBell() {
  if (sfxMuted) return;
  try {
    const ctx = getAudioCtx(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
  } catch (e) {}
}

function playSfx(type) {
  if (sfxMuted) return;
  try {
    const ctx = getAudioCtx(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    switch (type) {
      case 'move':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, ctx.currentTime);
        osc.frequency.setValueAtTime(500, ctx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
        break;
      case 'attack':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.25);
        break;
      case 'hit':
        osc.type = 'square';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.setValueAtTime(150, ctx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.18, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.2);
        break;
      case 'kill':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
        break;
      case 'skill': {
        osc.type = 'sine'; osc.frequency.value = 0; gain.gain.value = 0;
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.01);
        const now = ctx.currentTime;
        const out = ctx.destination;
        const sparkleNotes = [784, 988, 1175, 1397, 1568, 1760];
        for (let i = 0; i < sparkleNotes.length; i++) {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = 'sine'; o.frequency.value = sparkleNotes[i];
          g.gain.setValueAtTime(0.12, now + i * 0.05);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.2);
          o.connect(g); g.connect(out);
          o.start(now + i * 0.05); o.stop(now + i * 0.05 + 0.25);
        }
        const chordTime = now + 0.3;
        const chordFreqs = [523.25, 659.25, 783.99, 1046.5];
        for (const freq of chordFreqs) {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = 'triangle'; o.frequency.value = freq;
          g.gain.setValueAtTime(0.08, chordTime);
          g.gain.linearRampToValueAtTime(0.06, chordTime + 0.15);
          g.gain.exponentialRampToValueAtTime(0.001, chordTime + 0.7);
          o.connect(g); g.connect(out);
          o.start(chordTime); o.stop(chordTime + 0.75);
        }
        const nBuf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
        const nData = nBuf.getChannelData(0);
        for (let j = 0; j < nData.length; j++) nData[j] = (Math.random() * 2 - 1);
        const noise = ctx.createBufferSource();
        noise.buffer = nBuf;
        const nGain = ctx.createGain();
        nGain.gain.setValueAtTime(0.06, now);
        nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        const hpf = ctx.createBiquadFilter();
        hpf.type = 'highpass'; hpf.frequency.value = 6000;
        noise.connect(hpf); hpf.connect(nGain); nGain.connect(out);
        noise.start(now); noise.stop(now + 0.15);
        break;
      }
      case 'opp_skill': {
        osc.type = 'sine'; osc.frequency.value = 0; gain.gain.value = 0;
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.01);
        const now2 = ctx.currentTime;
        const out2 = ctx.destination;
        const boom = ctx.createOscillator();
        const boomG = ctx.createGain();
        boom.type = 'sawtooth';

function _sfxTone(ctx, time, freq, dur, type, gain, glide) {
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, time);
  if (glide) o.frequency.exponentialRampToValueAtTime(glide, time + dur);
  g.gain.setValueAtTime(0.001, time);
  g.gain.linearRampToValueAtTime(gain || 0.1, time + Math.min(0.02, dur * 0.2));
  g.gain.exponentialRampToValueAtTime(0.001, time + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(time); o.stop(time + dur + 0.02);
}
function _sfxNoise(ctx, time, dur, gain, hpFreq, lpFreq) {
  const buf = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * dur)), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain();
  g.gain.setValueAtTime(gain || 0.1, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur);
  let node = src;
  if (hpFreq) { const f = ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hpFreq; node.connect(f); node = f; }
  if (lpFreq) { const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lpFreq; node.connect(f); node = f; }
  node.connect(g); g.connect(ctx.destination);
  src.start(time); src.stop(time + dur);
}

function playSfxWizardInstant() { try { const ctx = getAudioCtx(); if (!ctx) return; const now = ctx.currentTime; _sfxTone(ctx, now, 800, 0.3, 'sine', 0.08, 2400); _sfxTone(ctx, now + 0.1, 1600, 0.3, 'sine', 0.06, 3200); _sfxNoise(ctx, now + 0.05, 0.2, 0.03, 6000); } catch (e) {} }
function playSfxIronSkin() { try { const ctx = getAudioCtx(); if (!ctx) return; const now = ctx.currentTime; _sfxNoise(ctx, now, 0.05, 0.18, 800, 3000); _sfxTone(ctx, now, 180, 0.25, 'square', 0.1, 100); } catch (e) {} }
function playSfxBodyguardLoyalty() { try { const ctx = getAudioCtx(); if (!ctx) return; const now = ctx.currentTime; _sfxNoise(ctx, now, 0.08, 0.2, 400, 2000); _sfxTone(ctx, now + 0.04, 200, 0.18, 'sawtooth', 0.1); _sfxTone(ctx, now + 0.12, 350, 0.15, 'square', 0.06); } catch (e) {} }
function playSfxCountTyranny() { try { const ctx = getAudioCtx(); if (!ctx) return; const now = ctx.currentTime; _sfxTone(ctx, now, 110, 0.6, 'sawtooth', 0.1); _sfxTone(ctx, now, 165, 0.5, 'sawtooth', 0.07); _sfxNoise(ctx, now, 0.5, 0.04, 50, 300); } catch (e) {} }
function playSfxCommanderWrath() { try { const ctx = getAudioCtx(); if (!ctx) return; const now = ctx.currentTime; _sfxNoise(ctx, now, 0.06, 0.15, 50, 200); _sfxTone(ctx, now + 0.08, 392, 0.3, 'square', 0.08); _sfxTone(ctx, now + 0.18, 587, 0.25, 'square', 0.07); } catch (e) {} }
function playSfxButcherBetrayer() { try { const ctx = getAudioCtx(); if (!ctx) return; const now = ctx.currentTime; _sfxNoise(ctx, now, 0.15, 0.2, 1500, 5000); _sfxTone(ctx, now + 0.08, 200, 0.25, 'sawtooth', 0.1, 80); } catch (e) {} }
function playSfxTorturerMark() { try { const ctx = getAudioCtx(); if (!ctx) return; const now = ctx.currentTime; for (let i = 0; i < 4; i++) { _sfxNoise(ctx, now + i * 0.04, 0.025, 0.07, 3000, 8000); } _sfxTone(ctx, now + 0.2, 2200, 0.06, 'square', 0.1); } catch (e) {} }
